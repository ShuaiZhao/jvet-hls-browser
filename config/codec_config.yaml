# AI Configuration
ai:
  embedding_model: "text-embedding-3-small"
  embedding_dimension: 1536
  similarity_threshold: 0.75
  connection_strength_thresholds:
    strong: 0.90
    medium: 0.75
    weak: 0.60

# Connection detection patterns
connection_patterns:
  # Direct reference patterns
  reference_keywords:
    - "shall be equal to"
    - "refers to"
    - "references"
    - "identifies the"
    - "specifies the"

  # Dependency patterns
  dependency_keywords:
    - "depends on"
    - "is derived from"
    - "is calculated from"
    - "is set equal to"

  # Conditional patterns
  conditional_keywords:
    - "when"
    - "if"
    - "unless"
    - "only when"

  # Mutual exclusion patterns
  exclusion_keywords:
    - "shall not be present"
    - "mutually exclusive"
    - "either ... or"
