# Codec-specific configuration for HLS specification parsing

vvc:
  name: "VVC/H.266"
  full_name: "Versatile Video Coding"
  spec_file: "../H266_VVC/H266-VVC-v3.docx"

  # Section numbers for syntax and semantics
  syntax_section: "7.3"  # Will search 7.3.2, 7.3.4, 7.3.5, ... 7.3.11
  syntax_subsections: ["7.3.2", "7.3.4", "7.3.5", "7.3.6", "7.3.7", "7.3.8", "7.3.9", "7.3.10", "7.3.11"]
  semantics_section: "7.4"

  # Key syntax structures to extract (Section 7.3 subsections)
  key_structures:
    - "video_parameter_set_rbsp"
    - "seq_parameter_set_rbsp"
    - "pic_parameter_set_rbsp"
    - "adaptation_parameter_set_rbsp"
    - "picture_header_rbsp"
    - "slice_header"
    - "ref_pic_list_struct"
    - "nal_unit_header"

  # Parsing patterns
  patterns:
    syntax_descriptor_regex: '(\w+)\(\s*\)\s*\{'
    parameter_regex: '(\w+)\s+(ue\(v\)|u\(\d+\)|se\(v\)|i\(\d+\)|f\(\d+\))'
    condition_regex: 'if\s*\((.*?)\)'

  # Output settings
  output_dir: "data/vvc"
  web_config:
    title: "VVC/H.266 Interactive Specification"
    color_scheme: "#4A90E2"

